<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. Vue initiale : Très large sur toute la carte d'Haïti
    const map = L.map('map', {
        center: [18.9712, -72.2852], // Centre géographique d'Haïti
        zoom: 8, // Zoom éloigné pour tout voir
        zoomControl: false,
        attributionControl: false
    });

    // 2. Fond de carte sombre
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // 3. L'Animation "FlyTo" automatique après 1 seconde
    setTimeout(() => {
        map.flyTo([18.5392, -72.3350], 12.5, {
            animate: true,
            duration: 2.5 // Durée du plongeon en secondes (fluide et dynamique)
        });
    }, 1000); // Attend 1 seconde après le chargement avant de plonger

    // Fonction passerelle FlutterFlow
    function selectCommune(name) {
        if (window.FlutterFlowHorizPlatform && window.FlutterFlowHorizPlatform.postMessage) {
            window.FlutterFlowHorizPlatform.postMessage(name);
        } else if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(name);
        } else {
            console.log("Message envoyé : " + name);
        }
    }
</script>
</body>
</html>
