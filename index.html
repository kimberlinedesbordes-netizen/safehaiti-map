<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti Map - Frontières Officielles</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. Initialisation de la carte sur Haïti
    const map = L.map('map', {
        center: [18.9712, -72.2852],
        zoom: 8,
        zoomControl: false,
        attributionControl: false
    });

    // 2. Fond de carte sombre (avec les lignes blanches naturelles en fond)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // 3. Animation FlyTo vers la capitale
    setTimeout(() => {
        map.flyTo([18.5410, -72.2850], 11.8, {
            animate: true,
            duration: 2.5
        });
    }, 1000);

    // Liste des 8 communes officielles à cibler
    const targetCommunes = [
        "Delmas", "Port-au-Prince", "Pétion-Ville", "Tabarre", 
        "Croix-des-Bouquets", "Cité Soleil", "Carrefour", "Kenscoff"
    ];

    // Base de données temporaire pour les couleurs de test de SafeHaiti
    const zoneColors = {
        "Delmas": "#FF9800",        // Orange
        "Port-au-Prince": "#E53935", // Rouge
        "Cité Soleil": "#E53935",    // Rouge
        "Carrefour": "#FF9800",      // Orange
        "Croix-des-Bouquets": "#FF9800", // Orange
        "Tabarre": "#FFEB3B",        // Jaune
        "Pétion-Ville": "#4CAF50",   // Vert
        "Kenscoff": "#4CAF50"        // Vert
    };

    // 4. Chargement des VRAIES frontières géographiques d'Haïti (GeoJSON officiel)
    // Nous utilisons une source publique fiable contenant le découpage administratif d'Haïti
    fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/regions/haïti/communes-haiti.geojson')
    .then(response => {
        if (!response.ok) {
            // Si la première source échoue, on a une source de secours contenant les polygones mondiaux
            return fetch('https://opengeodata.ht/datasets/communes-haiti.geojson');
        }
        return response.json();
    })
    .then(geoData => {
        // On filtre le fichier pour ne garder STRICTEMENT que nos 8 communes de la capitale
        const filteredFeatures = geoData.features.filter(feature => {
            // Nettoyage du nom pour éviter les problèmes d'accents
            const name = feature.properties.ADM2_REF || feature.properties.name || "";
            return targetCommunes.some(target => name.toLowerCase().includes(target.toLowerCase()));
        });

        const cleanGeoJSON = {
            "type": "FeatureCollection",
            "features": filteredFeatures
        };

        // 5. Affichage des vraies formes sur la carte
        L.geoJSON(cleanGeoJSON, {
            style: function(feature) {
                const name = feature.properties.ADM2_REF || feature.properties.name || "";
                // Trouver la couleur correspondante
                let matchColor = "#666666"; // Gris par défaut si non trouvé
                for (let key in zoneColors) {
                    if (name.toLowerCase().includes(key.toLowerCase())) {
                        matchColor = zoneColors[key];
                        break;
                    }
                }

                return {
                    color: "#ffffff",          // Ligne blanche très fine pour froncer sur le tracé de base
                    weight: 1.5,               // Épaisseur parfaite
                    opacity: 0.6,
                    fillColor: matchColor,     // Remplissage avec nos vraies couleurs SafeHaiti
                    fillOpacity: 0.4           // Effet transparent moderne
                };
            },
            onEachFeature: function(feature, layer) {
                const name = feature.properties.ADM2_REF || feature.properties.name || "Zone";
                
                // Au clic, on extrait le vrai nom propre (ex: "Delmas")
                let cleanName = name;
                targetCommunes.forEach(target => {
                    if (name.toLowerCase().includes(target.toLowerCase())) {
                        cleanName = target;
                    }
                });

                layer.on('click', function() {
                    selectCommune(cleanName);
                });
            }
        }).addTo(map);
    })
    .catch(error => console.error("Erreur lors du chargement des frontières officielles :", error));

    // Passerelle FlutterFlow
    function selectCommune(name) {
        if (window.FlutterFlowHorizPlatform && window.FlutterFlowHorizPlatform.postMessage) {
            window.FlutterFlowHorizPlatform.postMessage(name);
        } else if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(name);
        } else {
            console.log("Zone cliquée : " + name);
        }
    }
</script>
</body>
</html>
