<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti - Studio de Traçage</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
        /* Style du panneau de contrôle des coordonnées */
        #coord-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid #4169E1;
            box-shadow: 0 0 15px rgba(65, 105, 225, 0.4);
            color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            z-index: 1000;
            width: 85%;
            max-height: 150px;
            overflow-y: auto;
        }
        .neon-border {
            filter: drop-shadow(0px 0px 4px rgba(65, 105, 225, 0.9));
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="coord-panel">
    <strong>Studio de Traçage SafeHaiti</strong><br>
    Clique sur la carte pour dessiner la frontière Nord (Passe par Jammeau, Hatte, Grâce de Dieu).<br>
    <span id="output">[]</span>
</div>

<script>
    const map = L.map('map', {
        center: [18.5700, -72.2900], // Centré un peu plus haut pour bien voir le Nord
        zoom: 12.0,
        zoomControl: false,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // Tableau pour stocker tes points cliqués
    let clickedCoords = [];
    let activeLine = L.polyline([], {
        color: "#4169E1",
        weight: 4,
        className: 'neon-border'
    }).addTo(map);

    // Fonction qui capture tes clics en direct
    map.on('click', function(e) {
        const lat = parseFloat(e.latlng.lat.toFixed(5));
        const lng = parseFloat(e.latlng.lng.toFixed(5));
        
        // Ajoute le point
        clickedCoords.push([lat, lng]);
        
        // Met à jour la ligne sur ton écran
        activeLine.setLatLngs(clickedCoords);
        
        // Ajoute un petit point de repère visuel
        L.circleMarker(e.latlng, {
            radius: 4,
            fillColor: '#00D2FF',
            color: '#4169E1',
            weight: 1,
            fillOpacity: 1
        }).addTo(map);

        // Affiche la liste des coordonnées dans la boîte en bas
        let textOutput = "[\n";
        clickedCoords.forEach((coord, index) => {
            textOutput += `  [${coord[0]}, ${coord[1]}]${index < clickedCoords.length - 1 ? ',' : ''}\n`;
        });
        textOutput += "]";
        document.getElementById('output').innerText = textOutput;
    });
</script>
</body>
</html>
