<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti - Étape 1 (Hatte Incluse)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. Vue initiale : Toute l'île d'Haïti au démarrage
    const map = L.map('map', {
        center: [18.9712, -72.2852],
        zoom: 8,
        zoomControl: false,
        attributionControl: false
    });

    // 2. Fond de carte sombre
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // 3. Animation vers la capitale et Verrouillage élargi
    setTimeout(() => {
        // On recule un tout petit peu le zoom initial (12.0 au lieu de 12.5) 
        // pour que Hatte, Moler et Jammeau soient visibles d'un coup d'œil au Nord
        map.flyTo([18.5600, -72.2900], 12.0, {
            animate: true,
            duration: 2.5
        });

        map.once('moveend', function() {
            // ÉLARGISSEMENT DES BORNES :
            // On fait monter le Nord à 18.7000 (au lieu de 18.6300) pour libérer Hatte et ses environs
            const southWest = L.latLng(18.4400, -72.4300);
            const northEast = L.latLng(18.7000, -72.1800); 
            const bounds = L.latLngBounds(southWest, northEast);
            
            map.setMaxBounds(bounds);
            map.setMinZoom(11.5); // Permet un dézoom très léger pour le confort visuel
            
            console.log("Carte verrouillée. Zone Nord élargie pour inclure Hatte.");
        });

    }, 1000);
</script>
</body>
</html>
