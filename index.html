<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti - Studio Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
        #studio-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid #4169E1;
            box-shadow: 0 0 15px rgba(65, 105, 225, 0.4);
            color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            z-index: 1000;
            width: 85%;
        }
        button {
            background: #4169E1;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }
        button:hover {
            background: #00D2FF;
        }
        .neon-border {
            filter: drop-shadow(0px 0px 4px rgba(65, 105, 225, 0.9));
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="studio-panel">
    <strong>Studio SafeHaiti (Suis la ligne ROUGE guide)</strong><br>
    <button id="undo-btn">↩️ Annuler le dernier point (Undo)</button>
    <pre id="output" style="margin-top:10px; max-height: 80px; overflow-y:auto;">[]</pre>
</div>

<script>
    const map = L.map('map', {
        center: [18.5800, -72.2800],
        zoom: 12.0,
        zoomControl: false,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // GUIDE VISUEL : Une ligne rouge simplifiée qui montre la vraie frontière Nord historique
    // Elle passe bien au-dessus de Jammeau, Moler, Hatte, et englobe Grâce de Dieu
    const officialGuideCoords = [
        [18.5900, -72.3450], // Départ Côte Mer
        [18.6100, -72.3250], // Au-dessus de Jammeau
        [18.6230, -72.3080], // Au-dessus de Moler
        [18.6360, -72.2920], // Sommet Nord (Hatte inclus)
        [18.6250, -72.2600], // Zone Grâce de Dieu
        [18.5950, -72.2200]  // Fin Est vers Canaan
    ];

    // On affiche le guide en rouge très fin pour t'aider
    L.polyline(officialGuideCoords, {
        color: "#ff3333",
        weight: 1.5,
        dashArray: "5, 5", // Ligne pointillée
        opacity: 0.7
    }).addTo(map);

    // Variables pour ton tracé Bleu Roi
    let clickedCoords = [];
    let markersGroup = L.layerGroup().addTo(map);
    let activeLine = L.polyline([], {
        color: "#4169E1",
        weight: 4,
        className: 'neon-border'
    }).addTo(map);

    // Clic pour ajouter un point
    map.on('click', function(e) {
        const lat = parseFloat(e.latlng.lat.toFixed(5));
        const lng = parseFloat(e.latlng.lng.toFixed(5));
        
        clickedCoords.push([lat, lng]);
        updateMap();
    });

    // Bouton Undo
    document.getElementById('undo-btn').addEventListener('click', function(e) {
        e.stopPropagation(); // Empêche de cliquer sur la carte en même temps
        clickedCoords.pop(); // Retire le dernier point
        updateMap();
    });

    function updateMap() {
        // Recalcule la ligne
        activeLine.setLatLngs(clickedCoords);
        
        // Recalcule les points visuels
        markersGroup.clearLayers();
        clickedCoords.forEach(coord => {
            L.circleMarker(coord, {
                radius: 4,
                fillColor: '#00D2FF',
                color: '#4169E1',
                weight: 1,
                fillOpacity: 1
            }).addTo(markersGroup);
        });

        // Met à jour le texte
        let textOutput = "[\n";
        clickedCoords.forEach((coord, index) => {
            textOutput += `  [${coord[0]}, ${coord[1]}]${index < clickedCoords.length - 1 ? ',' : ''}\n`;
        });
        textOutput += "]";
        document.getElementById('output').innerText = textOutput;
    }
</script>
</body>
</html>
