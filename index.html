    // ==========================================
    // INTERACTIF : SECTEUR 5 (Jaune Fluo)
    // ==========================================
    let s5Coords = [];
    let markersGroup = L.layerGroup().addTo(map);
    let activeLine = L.polyline([], { color: "#FFFF00", weight: 4, className: 'neon-yellow' }).addTo(map);

    map.on('click', function(e) {
        const lat = parseFloat(e.latlng.lat.toFixed(5));
        const lng = parseFloat(e.latlng.lng.toFixed(5));
        s5Coords.push([lat, lng]);
        updateMap();
    });

    document.getElementById('undo-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        s5Coords.pop();
        updateMap();
    });

    function updateMap() {
        activeLine.setLatLngs(s5Coords);
        markersGroup.clearLayers();
        s5Coords.forEach(coord => {
            L.circleMarker(coord, { radius: 4, fillColor: '#ffffff', color: '#FFFF00', weight: 1, fillOpacity: 1 }).addTo(markersGroup);
        });

        let textOutput = "[\n";
        s5Coords.forEach((coord, index) => {
            textOutput += `  [${coord[0]}, ${coord[1]}]${index < s5Coords.length - 1 ? ',' : ''}\n`;
        });
        textOutput += "]";
        document.getElementById('output').innerText = textOutput;
    }
