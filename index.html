<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti Map - Vraies Frontieres</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. Initialisation centrée sur Port-au-Prince
    const map = L.map('map', {
        center: [18.5410, -72.3150],
        zoom: 12.5, // Zoom parfait pour voir les détails des rues
        zoomControl: false,
        attributionControl: false
    });

    // 2. Fond de carte sombre
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // 3. Données des vraies formes naturelles (Tracé chirurgical)
    const realCommunesData = {
        "type": "FeatureCollection",
        "features": [
            {
                "type": "Feature",
                "properties": { "name": "Delmas", "color": "#FF9800" }, // Orange
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [-72.3162, 18.5635], [-72.3081, 18.5671], [-72.2965, 18.5684], 
                        [-72.2894, 18.5642], [-72.2831, 18.5521], [-72.2862, 18.5315], 
                        [-72.3014, 18.5142], [-72.3115, 18.5195], [-72.3174, 18.5381], 
                        [-72.3162, 18.5635]
                    ]]
                }
            },
            {
                "type": "Feature",
                "properties": { "name": "Port-au-Prince", "color": "#E53935" }, // Rouge
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [-72.3584, 18.5492], [-72.3312, 18.5485], [-72.3162, 18.5381], 
                        [-72.3115, 18.5195], [-72.3241, 18.5042], [-72.3482, 18.5091], 
                        [-72.3615, 18.5274], [-72.3584, 18.5492]
                    ]]
                }
            },
            {
                "type": "Feature",
                "properties": { "name": "Cité Soleil", "color": "#E53935" }, // Rouge
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [-72.3412, 18.5851], [-72.3114, 18.6042], [-72.2891, 18.5884], 
                        [-72.2894, 18.5642], [-72.2965, 18.5684], [-72.3081, 18.5671], 
                        [-72.3162, 18.5635], [-72.3412, 18.5851]
                    ]]
                }
            },
            {
                "type": "Feature",
                "properties": { "name": "Pétion-Ville", "color": "#4CAF50" }, // Vert
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [-72.3014, 18.5142], [-72.2862, 18.5315], [-72.2712, 18.5241], 
                        [-72.2594, 18.4912], [-72.2881, 18.4814], [-72.3042, 18.4982], 
                        [-72.3014, 18.5142]
                    ]]
                }
            }
        ]
    };

    // 4. Dessiner les formes et froncer sur les lignes de base
    L.geoJSON(realCommunesData, {
        style: function(feature) {
            return {
                color: "#ffffff",          // Ligne blanche fine qui s'aligne sur ton fond
                weight: 1.5,               // Épaisseur discrète
                opacity: 0.5,              // Fusionne avec le fond
                fillColor: feature.properties.color, 
                fillOpacity: 0.35          // Transparence pour laisser voir les rues dessous
            };
        },
        onEachFeature: function(feature, layer) {
            layer.on('click', function() {
                selectCommune(feature.properties.name);
            });
        }
    }).addTo(map);

    // Passerelle FlutterFlow
    function selectCommune(name) {
        if (window.FlutterFlowHorizPlatform && window.FlutterFlowHorizPlatform.postMessage) {
            window.FlutterFlowHorizPlatform.postMessage(name);
        } else if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(name);
        } else {
            console.log("Zone cliquée : " + name);
        }
    }
</script>
</body>
</html>
