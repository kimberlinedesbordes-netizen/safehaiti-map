<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti - Tracé Frontière Nord</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
        /* Effet néon Bleu Roi ultra-moderne */
        .neon-border {
            filter: drop-shadow(0px 0px 4px rgba(65, 105, 225, 0.9)) 
                    drop-shadow(0px 0px 8px rgba(65, 105, 225, 0.6));
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. Initialisation et recentrage automatique
    const map = L.map('map', {
        center: [18.5600, -72.2900],
        zoom: 12.0,
        zoomControl: false,
        attributionControl: false
    });

    // 2. Fond de carte sombre
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // Verrouillage de la zone (Hatte et Grâce de Dieu incluses)
    const southWest = L.latLng(18.4400, -72.4300);
    const northEast = L.latLng(18.7000, -72.1800);
    const bounds = L.latLngBounds(southWest, northEast);
    map.setMaxBounds(bounds);
    map.setMinZoom(11.5);

    // 3. Coordonnées de la ligne Nord (Chirurgie visuelle)
    // Ce tracé part de la côte ouest, passe au-dessus de Jammeau/Moler, survole Hatte et englobe Grâce de Dieu
    const northFrontierCoords = [
        [18.5850, -72.3450], // Point de départ à la mer (Nord de Cité Soleil)
        [18.5980, -72.3250], // Courbe au-dessus de Jammeau
        [18.6120, -72.3050], // Ligne qui passe au-dessus de Moler
        [18.6250, -72.2900], // Sommet Nord juste au-dessus de HATTE
        [18.6180, -72.2600], // Redescente pour englober GRÂCE DE DIEU
        [18.5950, -72.2300]  // Fin de la frontière Nord-Est (Canaan Est)
    ];

    // 4. Création et affichage de la ligne de lumière Bleu Roi
    const northLine = L.polyline(northFrontierCoords, {
        color: "#4169E1",         // Bleu Roi Électrique
        weight: 4,                // Fine et tranchante
        opacity: 0.9,
        className: 'neon-border'  // Activation de la lueur CSS
    }).addTo(map);

    // Petit effet interactif si on clique sur la frontière
    northLine.on('click', function() {
        if (window.FlutterFlowHorizPlatform && window.FlutterFlowHorizPlatform.postMessage) {
            window.FlutterFlowHorizPlatform.postMessage("Frontière Nord");
        } else {
            console.log("Clic détecté sur la Frontière Nord");
        }
    });

</script>
</body>
</html>
