<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti - Studio Grâce de Dieu</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
        #studio-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid #4169E1;
            box-shadow: 0 0 15px rgba(65, 105, 225, 0.4);
            color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            z-index: 1000;
            width: 85%;
        }
        button {
            background: #4169E1;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }
        button:hover {
            background: #00D2FF;
        }
        .neon-border {
            filter: drop-shadow(0px 0px 4px rgba(65, 105, 225, 0.9));
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="studio-panel">
    <strong>Studio SafeHaiti (Balise Grâce de Dieu activée)</strong><br>
    Le point Cyan clignotant montre la position réelle de Grâce de Dieu.<br>
    <button id="undo-btn">↩️ Annuler le dernier point (Undo)</button>
    <pre id="output" style="margin-top:10px; max-height: 80px; overflow-y:auto;">[]</pre>
</div>

<script>
    const map = L.map('map', {
        center: [18.5900, -72.2700], 
        zoom: 11.8,
        zoomControl: false,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // 1. REPÈRE FIXE : Position GPS exacte de Grâce de Dieu
    const graceDeDieuCoords = [18.6510, -72.2490];
    
    // On dessine un anneau lumineux pour repérer Grâce de Dieu sans texte caché
    L.circleMarker(graceDeDieuCoords, {
        radius: 8,
        fillColor: '#00D2FF',
        color: '#ffffff',
        weight: 2,
        fillOpacity: 0.8
    }).addTo(map).bindTooltip("📍 Village Grâce de Dieu", { permanent: true, direction: 'right', className: 'bg-transparent text-white border-0' });

    // 2. GUIDE ROUGE : Ajusté pour passer fièrement au-dessus du repère
    const officialGuideCoords = [
        [18.5900, -72.3450], // Côte Mer (Cité Soleil)
        [18.6150, -72.3250], // Au-dessus de Jammeau
        [18.6320, -72.3050], // Au-dessus de Moler
        [18.6480, -72.2880], // Au-dessus de Hatte
        [18.6650, -72.2450], // POINTE NORD-EST : Passe au-dessus du point Grâce de Dieu
        [18.6420, -72.2300], // Descente
        [18.6100, -72.2100]  // Fin Est
    ];

    L.polyline(officialGuideCoords, {
        color: "#ff3333",
        weight: 1.8,
        dashArray: "6, 6",
        opacity: 0.8
    }).addTo(map);

    // 3. Système de tracé interactif Bleu Roi
    let clickedCoords = [];
    let markersGroup = L.layerGroup().addTo(map);
    let activeLine = L.polyline([], {
        color: "#4169E1",
        weight: 4,
        className: 'neon-border'
    }).addTo(map);

    map.on('click', function(e) {
        const lat = parseFloat(e.latlng.lat.toFixed(5));
        const lng = parseFloat(e.latlng.lng.toFixed(5));
        clickedCoords.push([lat, lng]);
        updateMap();
    });

    document.getElementById('undo-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        clickedCoords.pop();
        updateMap();
    });

    function updateMap() {
        activeLine.setLatLngs(clickedCoords);
        markersGroup.clearLayers();
        clickedCoords.forEach(coord => {
            L.circleMarker(coord, {
                radius: 4,
                fillColor: '#00D2FF',
                color: '#4169E1',
                weight: 1,
                fillOpacity: 1
            }).addTo(markersGroup);
        });

        let textOutput = "[\n";
        clickedCoords.forEach((coord, index) => {
            textOutput += `  [${coord[0]}, ${coord[1]}]${index < clickedCoords.length - 1 ? ',' : ''}\n`;
        });
        textOutput += "]";
        document.getElementById('output').innerText = textOutput;
    }
</script>
</body>
</html>
