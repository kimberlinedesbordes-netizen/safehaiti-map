<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti - Étape 1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. Vue initiale : Très large sur toute l'île d'Haïti au démarrage
    const map = L.map('map', {
        center: [18.9712, -72.2852],
        zoom: 8,
        zoomControl: false,
        attributionControl: false
    });

    // 2. Fond de carte sombre et moderne
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // 3. Animation de zoom vers la capitale + Verrouillage de la zone
    setTimeout(() => {
        // Le grand plongeon fluide vers Port-au-Prince
        map.flyTo([18.5410, -72.3150], 12.5, {
            animate: true,
            duration: 2.5
        });

        // Dès que l'animation est finie, on active le "piège" (limites strictes)
        map.once('moveend', function() {
            // Définition de la zone maximale autorisée (Aire Métropolitaine uniquement)
            const southWest = L.latLng(18.4400, -72.4300);
            const northEast = L.latLng(18.6300, -72.1800);
            const bounds = L.latLngBounds(southWest, northEast);
            
            // On applique le verrouillage
            map.setMaxBounds(bounds);
            map.setMinZoom(12); // Empêche de dézoomer et de revoir le reste d'Haïti vide
            
            console.log("Carte verrouillée sur les 8 secteurs.");
        });

    }, 1000); // Attend 1 seconde avant de plonger
</script>
</body>
</html>
