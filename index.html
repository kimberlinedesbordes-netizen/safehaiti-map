<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti - Studio Secteur 2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        .leaflet-container {
            background: #121212 !important;
        }
        #studio-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid #00D2FF;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            z-index: 1000;
            width: 85%;
        }
        button {
            background: #00D2FF;
            color: #121212;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }
        button:hover {
            background: #4169E1;
            color: white;
        }
        .neon-royal {
            filter: drop-shadow(0px 0px 5px rgba(65, 105, 225, 0.9));
        }
        .neon-cyan {
            filter: drop-shadow(0px 0px 5px rgba(0, 210, 255, 0.9));
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="studio-panel">
    <strong>Secteur 1 (Croix-des-Bouquets) : <span style="color:#4169E1;">SAUVEGARDÉ</span></strong><br>
    <span style="color:#00D2FF;">En cours : Secteur 2 (Trace le contour de Cité Soleil / Tabarre)</span><br>
    <button id="undo-btn">↩️ Annuler le dernier point</button>
    <pre id="output" style="margin-top:10px; max-height: 80px; overflow-y:auto;">[]</pre>
</div>

<script>
    const map = L.map('map', {
        center: [18.5750, -72.2900], 
        zoom: 12.0,
        zoomControl: false,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // ==========================================
    // SECTEUR 1 : TES COORDONNÉES FINALES FIGÉES
    // ==========================================
    const secteur1Coords = [
        [18.68203, -72.32609],[18.68796, -72.32497],[18.69064, -72.32162],[18.69227, -72.31879],[18.69316, -72.31622],[18.69154, -72.31339],[18.6904, -72.31081],[18.68894, -72.30669],[18.69122, -72.29673],[18.68464, -72.29382],[18.68911, -72.28712],[18.68699, -72.28369],[18.67781, -72.2703],[18.67441, -72.24232],[18.69911, -72.22876],[18.70123, -72.21622],[18.6905, -72.19666],[18.66369, -72.17915],[18.63443, -72.17417],[18.61573, -72.15443],[18.60955, -72.12782],[18.58663, -72.13898],[18.57655, -72.12164],[18.56324, -72.13846],[18.55307, -72.14387],[18.51957, -72.15202],[18.49455, -72.1946],[18.53359, -72.21554],[18.54401, -72.22378],[18.5539, -72.22867],[18.57, -72.23082],[18.56626, -72.23545],[18.57309, -72.2412],[18.57766, -72.24266],[18.57921, -72.24478],[18.58088, -72.24811],[18.5811, -72.24863],[18.58285, -72.24848],[18.5848, -72.24764],[18.58484, -72.24702],[18.58224, -72.242],[18.58224, -72.242],[18.58204, -72.23854],[18.57893, -72.23421],[18.57653, -72.23073],[18.58472, -72.22708],[18.59063, -72.22618],[18.59522, -72.22468],[18.59998, -72.22343],[18.60416, -72.22142],[18.61388, -72.21661],[18.62469, -72.2303],[18.63502, -72.25296],[18.64799, -72.25901],[18.64746, -72.26395],[18.64575, -72.2706],[18.64384, -72.27502],[18.64976, -72.28283],[18.65634, -72.28669],[18.65918, -72.29073],[18.66487, -72.29699],[18.66885, -72.3018],[18.67096, -72.30815],[18.67381, -72.31287],[18.67592, -72.31716],[18.6795, -72.32051],[18.68197, -72.32608]
    ];

    // Affichage permanent du Secteur 1 en Bleu Roi Néon
    L.polyline(secteur1Coords, {
        color: "#4169E1",
        weight: 4,
        className: 'neon-royal'
    }).addTo(map);


    // ==========================================
    // STUDIO POUR LE SECTEUR 2 (Cité Soleil / Tabarre)
    // ==========================================
    let secteur2Coords = [];
    let markersGroup = L.layerGroup().addTo(map);
    let activeLine = L.polyline([], {
        color: "#00D2FF", // Tracé en Cyan pour bien différencier pendant que tu dessines
        weight: 4,
        className: 'neon-cyan'
    }).addTo(map);

    map.on('click', function(e) {
        const lat = parseFloat(e.latlng.lat.toFixed(5));
        const lng = parseFloat(e.latlng.lng.toFixed(5));
        secteur2Coords.push([lat, lng]);
        updateMap();
    });

    document.getElementById('undo-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        secteur2Coords.pop();
        updateMap();
    });

    function updateMap() {
        activeLine.setLatLngs(secteur2Coords);
        markersGroup.clearLayers();
        secteur2Coords.forEach(coord => {
            L.circleMarker(coord, {
                radius: 4,
                fillColor: '#ffffff',
                color: '#00D2FF',
                weight: 1,
                fillOpacity: 1
            }).addTo(markersGroup);
        });

        let textOutput = "[\n";
        secteur2Coords.forEach((coord, index) => {
            textOutput += `  [${coord[0]}, ${coord[1]}]${index < secteur2Coords.length - 1 ? ',' : ''}\n`;
        });
        textOutput += "]";
        document.getElementById('output').innerText = textOutput;
    }
</script>
</body>
</html>
