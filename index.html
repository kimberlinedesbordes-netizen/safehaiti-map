<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHaiti Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
        }
        /* Style sombre pour la carte */
        .leaflet-container {
            background: #121212 !important;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. Centrage initial sur la zone métropolitaine de Port-au-Prince
    const map = L.map('map', {
        center: [18.5392, -72.3350], 
        zoom: 12,
        zoomControl: false,
        attributionControl: false
    });

    // 2. Fond de carte ultra-minimaliste et sombre (CartoDB Dark Matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
    }).addTo(map);

    // Fonction pour envoyer la commune cliquée à FlutterFlow
    function selectCommune(name) {
        if (window.FlutterFlowHorizPlatform && window.FlutterFlowHorizPlatform.postMessage) {
            window.FlutterFlowHorizPlatform.postMessage(name);
        } else if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(name);
        } else {
            console.log("Message envoyé à l'app : " + name);
        }
    }

    // Prochaine étape : Injection des frontières GeoJSON ici
</script>
</body>
</html>
